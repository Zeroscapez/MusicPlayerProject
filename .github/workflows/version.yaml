name: Create 

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  version:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        shell: pwsh
        run: |
          git fetch --tags

          $latestTag = git tag --list "v*" --sort=-v:refname | Select-Object -First 1

          if (-not $latestTag) {
              $latestTag = "v0.0.0"
          }

          $version = $latestTag.TrimStart("v")
          $parts = $version.Split(".")

          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          $commitMessage = git log -1 --pretty=%B

          if ($commitMessage -match "#major") {
              $major++
              $minor = 0
              $patch = 0
          }
          elseif ($commitMessage -match "#minor") {
              $minor++
              $patch = 0
          }
          else {
              $patch++
          }

          $newVersion = "v$major.$minor.$patch"

          echo "TAG_NAME=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Create tag
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.TAG_NAME }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag -a $tag -m "Release $tag"
          git push origin $tag